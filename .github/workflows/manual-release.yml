name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release, without a leading v. Example: 3.2.1"
        required: true
        type: string
      release_notes:
        description: "Optional notes to prepend to GitHub's generated release notes"
        required: false
        type: string
      draft:
        description: "Create the release as a draft"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark the release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve release version
        shell: pwsh
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          $version = ([string]$env:REQUESTED_VERSION).Trim() -replace '^[vV]', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version '$version' is not valid. Use semantic version format like 3.2.1."
          }

          $currentVersion = [string](Get-Content -Raw package.json | ConvertFrom-Json).version
          if ([version]$version -lt [version]$currentVersion) {
            throw "Release version '$version' is lower than the current package version '$currentVersion'."
          }

          $tag = "V$version"
          $existingTag = git ls-remote --tags origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            throw "Could not verify whether tag '$tag' exists. git ls-remote exited with $LASTEXITCODE."
          }
          if ($existingTag) {
            throw "Tag '$tag' already exists on origin."
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Update package version
        shell: pwsh
        run: npm version $env:RELEASE_VERSION --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build standalone Windows exe
        run: npm run dist:win -- --x64

      - name: Prepare release asset
        shell: pwsh
        run: |
          $source = "dist\electron\x64\CWPatcher.exe"
          if (-not (Test-Path -LiteralPath $source)) {
            throw "Expected release binary was not found at '$source'."
          }

          $assetDirectory = "dist\release"
          New-Item -ItemType Directory -Path $assetDirectory -Force | Out-Null

          $assetName = "CWPatcher-v$env:RELEASE_VERSION-win-x64.exe"
          $assetPath = Join-Path $assetDirectory $assetName
          Copy-Item -LiteralPath $source -Destination $assetPath -Force

          "RELEASE_ASSET=$assetPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Commit version bump and tag
        shell: pwsh
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json
          $stagedChanges = git diff --cached --name-only
          if (-not $stagedChanges) {
            Write-Host "Version files already match $env:RELEASE_VERSION; no commit needed."
          } else {
            git commit -m "Release $env:RELEASE_TAG"
          }

          git tag $env:RELEASE_TAG
          git push origin "HEAD:$env:TARGET_BRANCH"
          git push origin $env:RELEASE_TAG

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          IS_DRAFT: ${{ inputs.draft }}
          IS_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $arguments = @(
            "release",
            "create",
            $env:RELEASE_TAG,
            $env:RELEASE_ASSET,
            "--repo",
            $env:GITHUB_REPOSITORY,
            "--title",
            $env:RELEASE_TAG,
            "--generate-notes"
          )

          $notes = ([string]$env:RELEASE_NOTES).Trim()
          if (-not [string]::IsNullOrWhiteSpace($notes)) {
            $arguments += @("--notes", $notes)
          }

          if ($env:IS_DRAFT -eq "true") {
            $arguments += "--draft"
          }

          if ($env:IS_PRERELEASE -eq "true") {
            $arguments += "--prerelease"
          }

          gh @arguments
